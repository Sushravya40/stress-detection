<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Stress Detection System">

	<title>Stress Detection</title>

	<link rel="shortcut icon" type="image/png" href="static/img/appicon2.png">
	<link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,700" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="static/css/all.min.css">
	<link rel="stylesheet" href="static/bootstrap/css/bootstrap.min.css">
	<link rel="stylesheet" href="static/css/owl.carousel.css">
	<link rel="stylesheet" href="static/css/magnific-popup.css">
	<link rel="stylesheet" href="static/css/animate.css">
	<link rel="stylesheet" href="static/css/meanmenu.min.css">
	<link rel="stylesheet" href="static/css/main.css">
	<link rel="stylesheet" href="static/css/responsive.css">

	<style>
		body {
			background-image: url('/static/img/worklife-balance.png.png');
			background-size: cover;
			background-repeat: no-repeat;
			background-attachment: fixed;
		}
		
		/* --- Premium Header Styling --- */
		.top-header-area {
			background: rgba(5, 25, 34, 0.8) !important;
			backdrop-filter: blur(10px);
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
			padding: 15px 0 !important;
			transition: all 0.3s ease;
		}
		
		.is-sticky .top-header-area {
			background: rgba(5, 25, 34, 0.95) !important;
			padding: 10px 0 !important;
		}

		nav.main-menu ul li a {
			color: #ffffff !important;
			font-family: 'Poppins', sans-serif;
			font-weight: 600;
			text-transform: uppercase;
			font-size: 14px;
			letter-spacing: 1px;
			padding: 15px 20px !important;
			transition: color 0.3s ease;
		}

		nav.main-menu ul li a:hover,
		nav.main-menu ul li.active a {
			color: #ff9800 !important;
		}

		.admin-login-btn {
			background: #ff9800 !important;
			color: #fff !important;
			border: none !important;
			border-radius: 25px !important;
			padding: 8px 20px !important;
			font-weight: 700 !important;
			text-shadow: none !important;
		}

		/* --- Mobile Menu (MeanMenu) Fixes --- */
		.mobile-menu {
			display: none;
		}

		@media only screen and (max-width: 991px) {
			.main-menu {
				display: none !important;
			}
			.mobile-menu {
				display: block;
			}
			.mean-container .mean-bar {
				background: transparent !important;
				min-height: 0 !important;
				padding: 0 !important;
			}
			.mean-container a.meanmenu-reveal {
				width: 35px;
				height: 30px;
				padding: 8px !important;
				position: absolute;
				right: 20px;
				top: -30px !important;
				background: #ff9800 !important;
				border-radius: 5px;
				display: flex !important;
				flex-direction: column;
				justify-content: space-between;
			}
			.mean-container a.meanmenu-reveal span {
				background: #fff !important;
				height: 3px !important;
				margin-top: 0 !important;
			}
			.mean-container .mean-nav {
				background: rgba(5, 25, 34, 0.98) !important;
				margin-top: 50px !important;
			}
		}

		/* --- Hero Section Fixes --- */
		.hero-area {
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			padding: 80px 20px;
		}
		
		.alert {
			z-index: 10000 !important;
		}
	</style>
</head>
<body>
	<div class="top-header-area" id="sticker">
		<div class="container">
			<div class="row align-items-center">
				<div class="col-lg-12 col-sm-12 text-center">
					<div class="main-menu-wrap" style="position: relative;">
						<!-- Desktop Menu -->
						<nav class="main-menu">
							<ul class="d-flex justify-content-center align-items-center m-0 p-0" style="list-style: none;">
								<li><a href="/">Home</a></li>
								<li><a href="/about">About</a></li>
								<li><a href="/login">Log In</a></li>
								<li><a href="/registration">Register</a></li>
								<li class="ml-lg-4">
									<a href="/admin_login" class="admin-login-btn">🔐 Admin Login</a>
								</li>
							</ul>
						</nav>
						<!-- Mobile Menu Container -->
						<div class="mobile-menu"></div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- ✅ Centered Flash Messages -->
	{% with messages = get_flashed_messages(with_categories=true) %}
	  {% if messages %}
		<div style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; max-width: 600px; width: 90%;">
		  {% for category, message in messages %}
			<div class="alert alert-{{ category }} alert-dismissible fade show text-center" role="alert">
			  <i class="fas fa-info-circle me-2"></i> {{ message }}
			  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
			</div>
		  {% endfor %}
		</div>
	  {% endif %}
	{% endwith %}

	<div class="hero-area">
		<div class="container">
			<div class="hero-content-wrapper">
				{% block code %}{% endblock %}
			</div>
		</div>
	</div>

	<script src="static/js/jquery-1.11.3.min.js"></script>
	<script src="static/bootstrap/js/bootstrap.bundle.min.js"></script>
	<script src="static/js/jquery.meanmenu.min.js"></script>
	<script src="static/js/sticker.js"></script>
	<script src="static/js/main.js"></script>
	<script>
		$(document).ready(function() {
			// Re-init MeanMenu to be safe
			$('.main-menu').meanmenu({
				meanMenuContainer: '.mobile-menu',
				meanScreenWidth: "991"
			});
			
			setTimeout(() => {
				$('.alert').fadeOut();
			}, 3000);
		});
	</script>
</body>
</html>
