<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Stress Detection System">

	<title>Stress Detection</title>

	<link rel="shortcut icon" type="image/png" href="static/img/appicon2.png">
	<link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,700" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="static/css/all.min.css">
	<link rel="stylesheet" href="static/bootstrap/css/bootstrap.min.css">
	<link rel="stylesheet" href="static/css/owl.carousel.css">
	<link rel="stylesheet" href="static/css/magnific-popup.css">
	<link rel="stylesheet" href="static/css/animate.css">
	<link rel="stylesheet" href="static/css/meanmenu.min.css">
	<link rel="stylesheet" href="static/css/main.css">
	<link rel="stylesheet" href="static/css/responsive.css">

	<style>
		body {
			background-image: url('/static/img/worklife-balance.png.png');
			background-size: cover;
			background-repeat: no-repeat;
			background-attachment: fixed;
		}
		
		/* --- Simple Nav Styling (Old Version Style) --- */
		.top-header-area {
			position: absolute;
			z-index: 999;
			width: 100%;
			padding: 25px 0;
		}
		
		nav.main-menu ul li a {
			color: #ffffff !important;
			text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
			font-weight: 600;
			padding: 15px 20px !important;
		}
		
		nav.main-menu ul li a:hover {
			color: #ff9800 !important;
		}

		/* --- Mobile Menu Fixes --- */
		@media only screen and (max-width: 991px) {
			.main-menu {
				display: none !important;
			}
			.mean-container .mean-bar {
				background: transparent !important;
				padding: 0 !important;
				min-height: 0 !important;
				z-index: 9999;
			}
			.mean-container a.meanmenu-reveal {
				background: #ff9800 !important;
				color: #fff !important;
				padding: 12px !important;
				top: -30px !important;
				right: 20px !important;
				border-radius: 5px;
			}
			.mean-container .mean-nav {
				background: rgba(0,0,0,0.9) !important;
				margin-top: 50px !important;
			}
		}

		/* --- Centered Hero Section --- */
		.hero-area {
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			padding: 100px 0;
		}
		.hero-content-wrapper {
			width: 100%;
		}
	</style>
</head>
<body>
	<div class="top-header-area" id="sticker">
		<div class="container">
			<div class="row">
				<div class="col-lg-12 col-sm-12 text-center">
					<div class="main-menu-wrap">
						<nav class="main-menu">
							<ul>
								<li><a href="/">Home</a></li>
								<li><a href="/about">About</a></li>
								<li><a href="/login">Log In</a></li>
								<li><a href="/registration">Register</a></li>
								<li>
									<a href="/admin_login" class="btn btn-outline-warning ml-3" style="text-shadow: none;">🔐 Admin Login</a>
								</li>
							</ul>
						</nav>
						<div class="mobile-menu"></div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- ✅ Centered Flash Messages -->
	{% with messages = get_flashed_messages(with_categories=true) %}
	  {% if messages %}
		<div style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; max-width: 600px; width: 90%;">
		  {% for category, message in messages %}
			<div class="alert alert-{{ category }} alert-dismissible fade show text-center" role="alert">
			  <i class="fas fa-info-circle me-2"></i> {{ message }}
			  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
			</div>
		  {% endfor %}
		</div>
	  {% endif %}
	{% endwith %}

	<div class="hero-area">
		<div class="container">
			<div class="hero-content-wrapper">
				{% block code %}{% endblock %}
			</div>
		</div>
	</div>

	<script src="static/js/jquery-1.11.3.min.js"></script>
	<script src="static/bootstrap/js/bootstrap.bundle.min.js"></script>
	<script src="static/js/jquery.meanmenu.min.js"></script>
	<script src="static/js/sticker.js"></script>
	<script src="static/js/main.js"></script>
	<script>
		$(document).ready(function() {
			$('.main-menu').meanmenu({
				meanMenuContainer: '.mobile-menu',
				meanScreenWidth: "991"
			});
			setTimeout(() => {
				$('.alert').fadeOut();
			}, 3000);
		});
	</script>
</body>
</html>
