{% extends "base.html" %}

{% block code %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="hero-text-box text-center" style="background: rgba(255,255,255,0.15); padding: 50px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2);">
                <h1 style="color: #ffffff; margin-bottom: 25px; font-weight: 700; line-height: 1.2; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">Stress Detection in <br><span style="color: #ff9800;">IT Professionals</span></h1>
                <p class="mt-3" style="color: #ffffff; font-size: 1.2rem; line-height: 1.8; max-width: 800px; margin: 0 auto; text-shadow: 1px 1px 5px rgba(0,0,0,0.5);">
                    Utilizing advanced Machine Learning techniques to identify and manage stress levels, ensuring a healthier work-life balance for tech experts.
                </p>
                <div class="mt-5">
                    <a href="/registration" class="btn btn-warning btn-lg px-5 py-3" style="border-radius: 30px; font-weight: bold; box-shadow: 0 4px 15px rgba(255,152,0,0.4);">Get Started</a>
                    <p class="mt-3" style="color: #ffffff; text-shadow: 1px 1px 3px rgba(0,0,0,0.5);">Already have an account? <a href="/login" style="color: #ff9800; font-weight: bold;">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
